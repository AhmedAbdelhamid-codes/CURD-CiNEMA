<section class="py-5">

    <div class="container">

        <!-- Title -->
      <div class="title text-center mb-5">
          <h1 class="text-white"><span class="highlight">Movie and TV series</span> management system</h1>
          <p>
            بسهولة Add and manage your favorite movies and TV series
          </p>
      </div>

        <!-- Form -->
      <div class="movie-form mx-auto mb-5">
            <div class="mb-4">
             <label>عنوان العمل </label>
             <input type="text" id="tittle" class="form-control" placeholder="ادخل اسم الفيلم او المسلسل...">
            </div>
         
            <div class="details d-flex justify-content-center align-items-center flex-lg-nowrap flex-wrap gap-2">
            <div class="mb-4 w-100">
             <label>التصنيف</label>
             <input type="text" id="category" class="form-control" placeholder="رعب , خيال , دراما...">
            </div>
            <div class="mb-4 w-100">
             <label>السنة</label>
             <input type="number" id="year" class="form-control" placeholder="2026...">
            </div>
            </div>
          
            <div class="mb-4">
                <label>نوع العمل</label>
                <select class="form-select" id="type">
                    <option selected disabled>اختار نوع العمل</option>
                    <option value="افلام عربي">افلام عربي</option>
                    <option value="افلام اجنبي">افلام اجنبي</option>
                    <option value="مسلسلات عربي">مسلسلات عربي</option>
                    <option value="مسلسلات اجنبي">مسلسلات اجنبي</option>
                </select>
            </div>

            <div class="mb-4">
                <label>وصف العمل</label>
                <textarea rows="5" id="Description" class="form-control" placeholder="اكتب وصفا للعمل..."></textarea>
            </div>

            <div class="mb-4">
                <label>صورة العمل</label>
                <input type="file" id="fileinput" class="form-control">
            </div>

            <button type="button" class="w-100 add-btn mb-4" id="add-card">
                <i class="bi bi-plus-circle-fill"></i>
                اضافة العمل
            </button>
            <button type="button" class="d-none w-100 add-update mb-4" id="add-update">
                <i class="bi bi-plus-circle-fill"></i>
                تعديل العمل
            </button>
            
            <div class="search mt-3">
              <label>ابحث  عن الاعمال</label>
              <input  type="search" class="form-control w-100 mx-auto" id="search" placeholder="اسم الفلم او المسلسل..." >
            </div>
        </div>

        <!-- Movies -->
        <div class="row g-4" id="show">
           
        </div>
    </div>
</section>






<script src="./JS/bootstrap.bundle.min.js"></script>
